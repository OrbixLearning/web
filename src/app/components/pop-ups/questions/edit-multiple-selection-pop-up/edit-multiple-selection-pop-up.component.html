<o-pop-up-header [title]="(isEdit ? 'Editar' : 'Adicionar') + ' questão de múltipla seleção'" />

<form class="question-popup" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="qp-content">

        <section class="qp-body">
            @if (hasIndex) {
            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-fixed">
                <mat-label>Número</mat-label>
                <input matInput type="number" formControlName="index" />
            </mat-form-field>
            }

            <h4>Enunciado</h4>
            <o-markdown-editor [startingText]="getFormControl('statement').value" height="10vh"
                (textChange)="getFormControl('statement').setValue($event)" editorId="editorStatement"
                resize="vertical" />

            <h4>Alternativas</h4>
            <div class="options">
                @for (option of optionsFormControls; track $index) {
                <div class="option">
                    <o-markdown-editor [startingText]="option.value || 'Alternativa ' + ($index + 1)" height="40px"
                        (textChange)="option.setValue($event)" [editorId]="'editorOption' + $index" resize="vertical" />
                    <mat-checkbox [checked]="getFormControl('answers').value[$index]"
                        (change)="selectAnswer($index)"></mat-checkbox>
                    <button mat-icon-button (click)="deleteOption($index)" type="button" class="delete-button"
                        [style]="optionsFormControls.length <= 2 ? 'visibility: hidden' : ''">
                        <mat-icon>delete</mat-icon>
                    </button>
                </div>
                }
            </div>

            <div class="add-option">
                <o-text-button (onclick)="addOption()" icon="add">Adicionar alternativa</o-text-button>
            </div>

        </section>

        @if (hasSyllabus) {
        <section class="qp-syllabus">
            <h4>Tópicos contemplados na questão</h4>
            <o-syllabus [syllabus]="ctx.classroom?.syllabus" mode="select" (syllabusMarked)="markSyllabus($event)"
                [presets]="ctx.classroom?.presets" [preMarkedSyllabus]="data.syllabus" />
        </section>
        }
    </div>

    <o-pop-up-buttons [confirmButton]="isEdit ? 'Editar' : 'Adicionar'" [disable]="form.invalid" type="submit" />
</form>
