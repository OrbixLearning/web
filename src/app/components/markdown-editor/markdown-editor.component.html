<div class="editor-div" [style.--markdown-textarea-min-height]="height">
    <angular-markdown-editor class="editor" [textareaId]="editorId" [name]="editorId" [rows]="rows"
        [(ngModel)]="startingText" (ngModelChange)="textChange.emit($event)" [options]="EDITOR_OPTIONS"
        [locale]="customLocale" />
</div>
